name: arca-gis

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: arca_gis
      POSTGRES_USER: arca_user
      POSTGRES_PASSWORD: arca_secret_2024
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arca_user -d arca_gis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: arca_gis_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 arca_gis.asgi:application"
    volumes:
      - ./backend:/app
      - ./ai_module:/ai_module
    ports:
      - "8003:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgis://arca_user:arca_secret_2024@db:5432/arca_gis
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=arca-gis-dev-secret-key-change-in-production
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8003,http://10.0.2.2:8003
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/admin/login/', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai_module:
    build:
      context: ./ai_module
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./ai_module:/app
    environment:
      - BACKEND_URL=http://backend:8000

volumes:
  postgres_data:
