apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arca-gis-ingress
  namespace: arca-gis
  annotations:
    nginx.ingress.kubernetes.io/websocket-services: "arca-gis-backend"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
spec:
  rules:
    - host: arca-gis.africa
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: arca-gis-backend
                port:
                  number: 8000
          - path: /ai
            pathType: Prefix
            backend:
              service:
                name: arca-gis-ai
                port:
                  number: 8001
