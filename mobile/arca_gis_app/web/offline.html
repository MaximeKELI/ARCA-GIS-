<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARCA-GIS — Hors ligne</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #1B5E20; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; padding: 24px; }
    .card { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 32px; max-width: 360px; }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    p { opacity: 0.85; line-height: 1.5; }
    button { margin-top: 20px; background: white; color: #1B5E20; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ARCA-GIS</h1>
    <p>Vous êtes hors ligne. Les données mises en cache restent disponibles lorsque l'application est installée.</p>
    <button onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>
