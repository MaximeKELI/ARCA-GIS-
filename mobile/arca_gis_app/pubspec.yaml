name: arca_gis_app
description: "ARCA-GIS — Plateforme géomatique africaine pour l'agriculture, les urgences et le climat."
publish_to: 'none'
version: 7.6.0+11

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.2
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  geolocator: ^13.0.2
  web_socket_channel: ^3.0.1
  google_fonts: ^6.2.1
  intl: ^0.20.2
  flutter_spinkit: ^5.2.1
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.0
  fl_chart: ^0.69.0
  path_provider: ^2.1.5
  sqflite: ^2.4.1
  path: ^1.9.1
  url_launcher: ^6.3.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
